<!doctype html>
<html lang="en" data-color-mode="light" data-sketch-theme="sketch-paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%BASE_URL%favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <meta name="theme-color" content="#f3ead8" />
    <title>Quintet</title>
  </head>
  <body>
    <svg aria-hidden="true" focusable="false" width="0" height="0" style="position: absolute">
      <defs>
        <filter id="sketch-soft" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
