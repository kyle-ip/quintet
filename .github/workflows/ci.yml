name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: poc/package-lock.json

      - name: Install, test, build
        working-directory: poc
        run: |
          npm ci
          npm test
          npm run build

  prototype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        working-directory: prototype
        run: |
          pip install -e .
          pytest

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: poc/package-lock.json

      - name: Build with E2E helpers and run Playwright
        working-directory: poc
        env:
          VITE_E2E: "true"
        run: |
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e
